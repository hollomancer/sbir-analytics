[project]
name = "sbir-models"
version = "0.1.0"
description = "Pydantic data models for SBIR analytics pipelines"
authors = [{name = "Conrad Hollomon", email = "conrad.hollomon@pm.me"}]
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11,<3.12"
dependencies = [
    "pydantic>=2.8.0,<3.0.0",
]

[project.optional-dependencies]
pandas = ["pandas>=2.2.0,<4.0.0"]  # For Timestamp support in date parsing

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["sbir_models"]
