[project]
name = "sbir-ml"
version = "0.1.0"
description = "SBIR ML/data science — CET classification, transition detection, and analysis tools"
authors = [{name = "Conrad Hollomon", email = "conrad.hollomon@pm.me"}]
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11,<3.13"

dependencies = [
    "sbir-etl",
    "scikit-learn>=1.4.0,<2.0.0",
    "tqdm>=4.66.0,<5.0.0",
]

[project.optional-dependencies]
nlp = [
    "spacy>=3.7.0,<4.0.0",
    "huggingface-hub>=0.20.0,<2.0.0",
]
paecter-local = [
    "sentence-transformers>=2.7.0,<6.0.0",
    "torch>=2.0.0,<3.0.0",
    "transformers>=4.35.0,<6.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["sbir_ml"]
