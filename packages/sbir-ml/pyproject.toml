[project]
name = "sbir-ml"
version = "0.1.0"
description = "SBIR ML/data science — CET classification, transition detection, and analysis tools"
authors = [{name = "Conrad Hollomon", email = "conrad.hollomon@pm.me"}]
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11,<3.12"

dependencies = [
    "sbir-etl",
    "scikit-learn>=1.4.0,<2.0.0",
    "joblib>=1.4.2,<2.0.0",
    # Direct deps (also transitive via sbir-etl, but declared explicitly
    # so sbir-ml doesn't break if sbir-etl ever drops them)
    "loguru>=0.7.0,<1.0.0",
    "numpy<3",
    "pandas>=2.2.0,<4.0.0",
    "pydantic>=2.8.0,<3.0.0",
    "pyyaml>=6.0.0,<7.0.0",
    "tqdm>=4.66.0,<5.0.0",
]

[project.optional-dependencies]
nlp = [
    "spacy>=3.7.0,<4.0.0",
    "huggingface-hub>=0.20.0,<2.0.0",
]
paecter-local = [
    "sentence-transformers>=2.7.0,<6.0.0",
    "torch>=2.0.0,<3.0.0",
    "transformers>=4.35.0,<6.0.0",
]
notebooks = [
    "jupyterlab>=4.0.0,<5.0.0",
    "notebook>=7.0.0,<8.0.0",
    "matplotlib>=3.8.0,<4.0.0",
    "seaborn>=0.13.0,<1.0.0",
    "ipykernel>=6.29.0,<8.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["sbir_ml"]
