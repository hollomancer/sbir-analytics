[project]
name = "sbir-rag"
version = "0.1.0"
description = "SBIR RAG — LightRAG integration for semantic search and knowledge graph retrieval"
authors = [{name = "Conrad Hollomon", email = "conrad.hollomon@pm.me"}]
license = {text = "MIT"}
requires-python = ">=3.11,<3.13"

dependencies = [
    "lightrag-hku>=1.0.0",
    "sbir-etl",
    "sbir-ml",
    "sbir-graph",
    "pydantic>=2.8.0,<3.0.0",
    "pandas>=2.2.0,<4.0.0",
    "numpy>=1.26.0,<3.0.0",
    "loguru>=0.7.0,<1.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["sbir_rag"]
