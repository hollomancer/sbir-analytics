name: Build Container Images

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile*'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'sbir_etl/**'
      - 'packages/**'
      - 'scripts/**'
      - 'config/**'
      - 'workspace.server.yaml'
      - '.github/workflows/build-images.yml'
  schedule:
    # Weekly rebuild on Sunday at 4 AM UTC (after weekly tests at 2 AM)
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      image:
        description: 'Image to build'
        required: true
        type: choice
        options:
          - all
          - python-base
          - etl
          - full

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository_owner }}/sbir-analytics

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      python-deps: ${{ steps.filter.outputs.python-deps }}
      etl-code: ${{ steps.filter.outputs.etl-code }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            python-deps:
              - 'pyproject.toml'
              - 'uv.lock'
              - 'Dockerfile.python-base'
              # A workflow-only change (such as adding arm64) must rebuild the
              # base immediately after merge instead of waiting for Sunday.
              - '.github/workflows/build-images.yml'
            etl-code:
              - 'sbir_etl/**'
              - 'packages/**'
              - 'scripts/**'
              - 'config/**'
              - 'workspace.server.yaml'
              - 'Dockerfile'
              - '.github/workflows/build-images.yml'

  python-base:
    name: Build Python Base
    needs: [detect-changes]
    if: |
      github.event.inputs.image == 'all' ||
      github.event.inputs.image == 'python-base' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'push' && needs.detect-changes.outputs.python-deps == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push python-base (multi-arch)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.python-base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}-python-base:latest
            ${{ env.REGISTRY }}/${{ env.REPO }}-python-base:${{ github.sha }}
          cache-from: type=gha,scope=python-base
          cache-to: type=gha,mode=max,scope=python-base

  etl:
    name: Build ETL Image
    needs: [detect-changes, python-base]
    if: |
      always() &&
      (github.event.inputs.image == 'all' ||
       github.event.inputs.image == 'etl' ||
       github.event_name == 'schedule' ||
       (github.event_name == 'push' && (needs.detect-changes.outputs.python-deps == 'true' || needs.detect-changes.outputs.etl-code == 'true')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ETL image (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}:latest
            ${{ env.REGISTRY }}/${{ env.REPO }}:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.REPO }}-python-base:latest
          cache-from: type=gha,scope=etl
          cache-to: type=gha,mode=max,scope=etl

  full:
    name: Build Full Image (ML + Fiscal)
    needs: [python-base]
    if: always() && (github.event.inputs.image == 'all' || github.event.inputs.image == 'full' || github.event.inputs.image == '' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push full image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.full
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}-full:latest
            ${{ env.REGISTRY }}/${{ env.REPO }}-full:${{ github.sha }}
          build-args: |
            PYTHON_BASE=${{ env.REGISTRY }}/${{ env.REPO }}-python-base:latest
          cache-from: type=gha,scope=full
          cache-to: type=gha,mode=max,scope=full
