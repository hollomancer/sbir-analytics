name: ETL Pipeline

on:
  schedule:
    # Weekly full pipeline on Monday at 10 AM UTC
    - cron: "0 10 * * 1"
  workflow_dispatch:
    inputs:
      job:
        description: "Job to run"
        required: true
        type: choice
        options:
          - sbir_weekly_refresh  # SBIR extract, validate, enrich, load to Neo4j
          - usaspending_ingestion
          - uspto_pipeline
          - cet_pipeline
          - embeddings
          - fiscal_returns_mvp
          - all
      environment:
        description: "Neo4j environment"
        required: true
        default: production
        type: choice
        options:
          - production
          - test
      skip_neo4j:
        description: "Skip Neo4j loading"
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read
  packages: read

env:
  AWS_REGION: us-east-2
  S3_BUCKET: sbir-etl-prod-data
  SBIR_ETL_ENV: prod
  SBIR_ETL__PIPELINE__ENVIRONMENT: production
  IMAGE: ghcr.io/hollomancer/sbir-analytics:latest
  # PYTHONPATH is set per-step using $GITHUB_WORKSPACE (container mount path).
  # ${{ github.workspace }} expands to the host path and isn't valid inside the container.

jobs:
  sbir-pipeline:
    name: SBIR Pipeline
    if: github.event.inputs.job == 'sbir_weekly_refresh' || github.event.inputs.job == 'all' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: ghcr.io/hollomancer/sbir-analytics:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install AWS CLI
        run: pip install awscli && aws --version

      - name: Download data from S3
        env:
          S3_BUCKET: ${{ env.S3_BUCKET }}
        shell: bash
        run: |
          echo "📥 Downloading data from S3..."
          mkdir -p data/raw/sbir data/raw/sam_gov

          # Download latest SBIR awards (~350MB)
          LATEST_SBIR=$(aws s3 ls "s3://${S3_BUCKET}/raw/awards/" --recursive | sort | tail -1 | awk '{print $4}')
          if [ -n "$LATEST_SBIR" ]; then
            aws s3 cp "s3://${S3_BUCKET}/${LATEST_SBIR}" data/raw/sbir/award_data.csv
            echo "✅ Downloaded SBIR awards"
          fi

          # Download SAM.gov entity data (~380MB)
          aws s3 cp "s3://${S3_BUCKET}/raw/sam_gov/sam_entity_records.parquet" data/raw/sam_gov/sam_entity_records.parquet && echo "✅ Downloaded SAM.gov entities" || echo "⚠️ SAM.gov data not found"

          # Note: USAspending database (217GB) not downloaded - too large for GitHub runners
          # Use usaspending_ingestion job separately if needed

      - name: Run SBIR pipeline
        env:
          # Use test or production Neo4j based on environment input (default: production for scheduled runs)
          NEO4J_URI: ${{ github.event.inputs.environment == 'test' && secrets.NEO4J_TEST_URI || secrets.NEO4J_URI }}
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: ${{ github.event.inputs.environment == 'test' && secrets.NEO4J_TEST_PASSWORD || secrets.NEO4J_PASSWORD }}
          S3_BUCKET: ${{ env.S3_BUCKET }}
          SKIP_NEO4J_LOADING: ${{ github.event.inputs.skip_neo4j }}
        shell: bash
        run: |
          # Prefer checked-out code ($GITHUB_WORKSPACE) but keep /app from the
          # Docker image as a fallback.  $GITHUB_WORKSPACE should resolve to the
          # container mount path (/__w/<repo>/<repo>) but on some runner versions
          # it returns the host path instead, which doesn't exist in the container.
          export PYTHONPATH="${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}/packages/sbir-analytics:${GITHUB_WORKSPACE}/packages/sbir-ml:${GITHUB_WORKSPACE}/packages/sbir-graph:${GITHUB_WORKSPACE}/packages/sbir-rag:/app"

          echo "## 🎯 SBIR Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Determine which job to run - use sbir_weekly_refresh_job (now includes enrichment)
          JOB_NAME="sbir_weekly_refresh_job"

          echo "**Job:** \`$JOB_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Disable pipefail so PIPESTATUS[0] captures dagster's exit code
          # even when piped through tee.
          set +o pipefail
          dagster job execute \
            -m sbir_analytics.definitions \
            -j "$JOB_NAME" \
            2>&1 | tee sbir_output.txt

          EXIT_CODE=${PIPESTATUS[0]}
          set -o pipefail

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ **SBIR pipeline completed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Pipeline Output (last 30 lines):**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -30 sbir_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **SBIR pipeline failed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -50 sbir_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $EXIT_CODE
          fi

      - name: Publish enriched SBIR awards to canonical S3 key
        # The enriched_sbir_awards asset uploads to s3://<bucket>/enriched/sbir_awards.parquet
        # but downstream consumers (phase_transition_latency_job) look for it at
        # s3://<bucket>/processed/sbir/enriched_sbir_awards.parquet. Mirror the object to the
        # canonical key so downstream workflows can pick it up. If the source isn't there,
        # skip without failing and record a warning in the step summary
        # (e.g. enrichment short-circuited without new data).
        env:
          S3_BUCKET: ${{ env.S3_BUCKET }}
        shell: bash
        run: |
          set -euo pipefail
          SRC_KEY="enriched/sbir_awards.parquet"
          DEST_KEY="processed/sbir/enriched_sbir_awards.parquet"

          if aws s3api head-object --bucket "${S3_BUCKET}" --key "${SRC_KEY}" >/dev/null 2>&1; then
            aws s3 cp "s3://${S3_BUCKET}/${SRC_KEY}" "s3://${S3_BUCKET}/${DEST_KEY}"
            echo "✅ Mirrored enriched awards to s3://${S3_BUCKET}/${DEST_KEY}"
            echo "✅ Mirrored enriched awards to s3://${S3_BUCKET}/${DEST_KEY}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ No enriched awards at s3://${S3_BUCKET}/${SRC_KEY}; skipping mirror"
            echo "⚠️ No enriched awards at s3://${S3_BUCKET}/${SRC_KEY}; skipping mirror" >> "$GITHUB_STEP_SUMMARY"
          fi

  usaspending-pipeline:
    name: USAspending Pipeline
    if: github.event.inputs.job == 'usaspending_ingestion' || github.event.inputs.job == 'all'
    needs: [sbir-pipeline]
    runs-on: ubuntu-latest
    timeout-minutes: 180
    container:
      image: ghcr.io/hollomancer/sbir-analytics:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run USAspending pipeline
        env:
          S3_BUCKET: ${{ env.S3_BUCKET }}
        shell: bash
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}/packages/sbir-analytics:${GITHUB_WORKSPACE}/packages/sbir-ml:${GITHUB_WORKSPACE}/packages/sbir-graph:${GITHUB_WORKSPACE}/packages/sbir-rag:/app"

          echo "## 💰 USAspending Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          set +o pipefail
          dagster job execute \
            -m sbir_analytics.definitions \
            -j usaspending_iterative_enrichment_job \
            2>&1 | tee usaspending_output.txt

          EXIT_CODE=${PIPESTATUS[0]}
          set -o pipefail
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ **USAspending pipeline completed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Pipeline Output (last 30 lines):**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -30 usaspending_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **USAspending pipeline failed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -50 usaspending_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  uspto-pipeline:
    name: USPTO Pipeline
    if: github.event.inputs.job == 'uspto_pipeline' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    container:
      image: ghcr.io/hollomancer/sbir-analytics:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install AWS CLI
        run: pip install awscli && aws --version

      - name: Download USPTO data from S3
        env:
          S3_BUCKET: ${{ env.S3_BUCKET }}
        run: |
          echo "📥 Downloading USPTO data from S3..."
          mkdir -p data/raw/uspto

          # Download latest patent assignments to data/raw/uspto/ (asset expects files here)
          LATEST=$(aws s3 ls "s3://${S3_BUCKET}/raw/uspto/assignments/" | sort | tail -1 | awk '{print $2}')
          if [ -n "$LATEST" ]; then
            aws s3 cp "s3://${S3_BUCKET}/raw/uspto/assignments/${LATEST}" data/raw/uspto/ --recursive
            echo "✅ Downloaded USPTO assignments from ${LATEST}"
            ls -la data/raw/uspto/
          fi

      - name: Run USPTO pipeline
        env:
          NEO4J_URI: ${{ github.event.inputs.environment == 'test' && secrets.NEO4J_TEST_URI || secrets.NEO4J_URI }}
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: ${{ github.event.inputs.environment == 'test' && secrets.NEO4J_TEST_PASSWORD || secrets.NEO4J_PASSWORD }}
          S3_BUCKET: ${{ env.S3_BUCKET }}
          SKIP_NEO4J_LOADING: ${{ github.event.inputs.skip_neo4j }}
        shell: bash
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}/packages/sbir-analytics:${GITHUB_WORKSPACE}/packages/sbir-ml:${GITHUB_WORKSPACE}/packages/sbir-graph:${GITHUB_WORKSPACE}/packages/sbir-rag:/app"

          echo "## 📜 USPTO Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Note: uspto_validation_job requires full Patent Assignment Dataset
          # (assignment, assignee, assignor tables). Using AI extraction for now.
          set +o pipefail
          dagster job execute \
            -m sbir_analytics.definitions \
            -j uspto_ai_extraction_job \
            2>&1 | tee uspto_output.txt

          EXIT_CODE=${PIPESTATUS[0]}
          set -o pipefail
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ USPTO pipeline completed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ USPTO pipeline failed" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -50 uspto_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  cet-pipeline:
    name: CET Classification Pipeline
    if: github.event.inputs.job == 'cet_pipeline' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: ghcr.io/hollomancer/sbir-analytics:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run CET pipeline
        env:
          NEO4J_URI: ${{ github.event.inputs.environment == 'test' && secrets.NEO4J_TEST_URI || secrets.NEO4J_URI }}
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: ${{ github.event.inputs.environment == 'test' && secrets.NEO4J_TEST_PASSWORD || secrets.NEO4J_PASSWORD }}
          S3_BUCKET: ${{ env.S3_BUCKET }}
          SKIP_NEO4J_LOADING: ${{ github.event.inputs.skip_neo4j }}
        shell: bash
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}/packages/sbir-analytics:${GITHUB_WORKSPACE}/packages/sbir-ml:${GITHUB_WORKSPACE}/packages/sbir-graph:${GITHUB_WORKSPACE}/packages/sbir-rag:/app"

          echo "## 🏷️ CET Classification Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          set +o pipefail
          dagster job execute \
            -m sbir_analytics.definitions \
            -j cet_full_pipeline_job \
            2>&1 | tee cet_output.txt

          EXIT_CODE=${PIPESTATUS[0]}
          set -o pipefail
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ **CET pipeline completed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Pipeline Output (last 30 lines):**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -30 cet_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **CET pipeline failed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -50 cet_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  # Embedding generation (API mode, fits in 7GB)
  embeddings-pipeline:
    name: Embeddings
    if: github.event.inputs.job == 'embeddings' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    container:
      image: ghcr.io/hollomancer/sbir-analytics:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install HuggingFace dependencies
        run: pip install huggingface-hub

      - name: Run embeddings pipeline
        env:
          NEO4J_URI: ${{ github.event.inputs.environment == 'test' && secrets.NEO4J_TEST_URI || secrets.NEO4J_URI }}
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: ${{ github.event.inputs.environment == 'test' && secrets.NEO4J_TEST_PASSWORD || secrets.NEO4J_PASSWORD }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PAECTER_MODE: api  # Use API mode, not local model
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}/packages/sbir-analytics:${GITHUB_WORKSPACE}/packages/sbir-ml:${GITHUB_WORKSPACE}/packages/sbir-graph:${GITHUB_WORKSPACE}/packages/sbir-rag:/app"

          echo "## 🔬 Embeddings" >> $GITHUB_STEP_SUMMARY
          # Dagster job still registered as paecter_job (legacy name)
          set +o pipefail
          dagster job execute -m sbir_analytics.definitions -j paecter_job 2>&1 | tee output.txt
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "✅ Embeddings pipeline completed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Embeddings pipeline failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  # Fiscal runs on AWS Batch (BEA API I-O analysis)
  fiscal-pipeline:
    name: Fiscal Returns (AWS Batch)
    if: github.event.inputs.job == 'fiscal_returns_mvp' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Submit to AWS Batch
        id: batch
        run: |
          echo "## 💰 Fiscal Returns (AWS Batch)" >> $GITHUB_STEP_SUMMARY

          JOB_ID=$(aws batch submit-job \
            --job-name "fiscal-returns-$(date +%Y%m%d-%H%M%S)" \
            --job-queue "sbir-analytics-analysis-job-queue" \
            --job-definition "sbir-analytics-analysis-fiscal-returns" \
            --query 'jobId' --output text)

          echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT
          echo "Submitted job: $JOB_ID" >> $GITHUB_STEP_SUMMARY

      - name: Wait for completion
        env:
          POLL_INTERVAL: 30
          MAX_WAIT_SECONDS: 14400  # 4 hours (matches job timeout)
        run: |
          JOB_ID="${{ steps.batch.outputs.job_id }}"
          echo "Waiting for job $JOB_ID (timeout: ${MAX_WAIT_SECONDS}s)..."
          ELAPSED=0

          while [ "$ELAPSED" -lt "$MAX_WAIT_SECONDS" ]; do
            STATUS=$(aws batch describe-jobs --jobs "$JOB_ID" --query 'jobs[0].status' --output text)
            echo "[${ELAPSED}s] Status: $STATUS"

            case "$STATUS" in
              SUCCEEDED)
                echo "✅ Fiscal job completed" >> $GITHUB_STEP_SUMMARY
                exit 0
                ;;
              FAILED)
                echo "❌ Fiscal job failed" >> $GITHUB_STEP_SUMMARY
                aws batch describe-jobs --jobs "$JOB_ID" --query 'jobs[0].statusReason' --output text >> $GITHUB_STEP_SUMMARY
                exit 1
                ;;
            esac

            sleep "$POLL_INTERVAL"
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done

          echo "❌ Fiscal job timed out after ${MAX_WAIT_SECONDS}s (status: $STATUS)" >> $GITHUB_STEP_SUMMARY
          exit 1

  summary:
    name: Pipeline Summary
    needs: [sbir-pipeline, usaspending-pipeline, uspto-pipeline, cet-pipeline, embeddings-pipeline, fiscal-pipeline]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate summary
        run: |
          echo "# 📊 ETL Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Pipeline | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| SBIR | ${{ needs.sbir-pipeline.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| USAspending | ${{ needs.usaspending-pipeline.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| USPTO | ${{ needs.uspto-pipeline.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CET | ${{ needs.cet-pipeline.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Embeddings | ${{ needs.embeddings-pipeline.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Fiscal | ${{ needs.fiscal-pipeline.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
