name: Monthly Analysis

on:
  schedule:
    - cron: "0 6 1 * *"
    - cron: "0 14 1 * *"
  workflow_dispatch:
    inputs:
      analysis:
        description: "Which analysis to run"
        required: true
        default: "both"
        type: choice
        options:
          - benchmark
          - phase-transition
          - both
      fy:
        description: "Evaluation fiscal year"
        required: false
        default: "2026"
        type: string
      margin_awards:
        description: "Awards margin for sensitivity detection"
        required: false
        default: "5"
        type: string
      margin_ratio:
        description: "Ratio margin for sensitivity detection"
        required: false
        default: "0.05"
        type: string
      sbir_source:
        description: "SBIR data source"
        required: false
        default: "sbir-gov"
        type: choice
        options:
          - sbir-gov
          - s3
      usaspending_source:
        description: "USAspending data source"
        required: false
        default: "api"
        type: choice
        options:
          - api
          - s3
          - skip
      data_cut_date:
        description: "Right-censoring date (YYYY-MM-DD). Leave blank for today."
        required: false
        default: ""
        type: string
      skip_upstream_download:
        description: "Skip S3 download of upstream parquet files"
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read
  packages: read

concurrency:
  group: monthly-analysis
  cancel-in-progress: true

env:
  AWS_REGION: us-east-2
  S3_BUCKET: sbir-etl-prod-data
  PYTHON_VERSION: "3.11"
  SKIP_NEO4J_LOADING: "true"

jobs:
  benchmark:
    name: SBIR/STTR Benchmark Evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: |
      github.event.schedule == '0 6 1 * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.analysis == 'benchmark' || inputs.analysis == 'both'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python and UV
        uses: ./.github/actions/setup-python-uv
        with:
          install-dev-deps: "false"

      - name: Configure AWS credentials
        if: inputs.sbir_source == 's3' || inputs.usaspending_source == 's3'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set parameters
        id: params
        run: |
          echo "fy=${{ inputs.fy || '2026' }}" >> "$GITHUB_OUTPUT"
          echo "margin_awards=${{ inputs.margin_awards || '5' }}" >> "$GITHUB_OUTPUT"
          echo "margin_ratio=${{ inputs.margin_ratio || '0.05' }}" >> "$GITHUB_OUTPUT"
          echo "sbir_source=${{ inputs.sbir_source || 'sbir-gov' }}" >> "$GITHUB_OUTPUT"
          echo "usaspending_source=${{ inputs.usaspending_source || 'api' }}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Restore USAspending API cache
        if: steps.params.outputs.usaspending_source == 'api'
        uses: actions/cache@v5
        with:
          path: data/scripts_output/usaspending_api_cache.json
          key: usaspending-api-cache-fy${{ steps.params.outputs.fy }}-${{ github.run_number }}
          restore-keys: |
            usaspending-api-cache-fy${{ steps.params.outputs.fy }}-

      - name: Run benchmark analysis
        run: |
          SOURCE_FLAG=""
          if [ "${{ steps.params.outputs.sbir_source }}" = "s3" ]; then
            SOURCE_FLAG="--s3 --s3-bucket ${{ env.S3_BUCKET }}"
          fi

          USA_FLAG=""
          case "${{ steps.params.outputs.usaspending_source }}" in
            api)  USA_FLAG="--usaspending-api" ;;
            s3)   USA_FLAG="--usaspending-s3 --s3-bucket ${{ env.S3_BUCKET }}" ;;
            skip) USA_FLAG="" ;;
          esac

          uv run python scripts/data/run_benchmark_analysis.py \
            $SOURCE_FLAG \
            $USA_FLAG \
            --fy "${{ steps.params.outputs.fy }}" \
            --margin-awards "${{ steps.params.outputs.margin_awards }}" \
            --margin-ratio "${{ steps.params.outputs.margin_ratio }}"
        shell: bash
        timeout-minutes: 90

      - name: Summary
        if: always()
        env:
          BENCHMARK_FY: ${{ steps.params.outputs.fy }}
          BENCHMARK_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: uv run python scripts/ci/benchmark_summary.py data/scripts_output >> "$GITHUB_STEP_SUMMARY"
        shell: bash

      # Upload input data so every evaluation can be fully reproduced
      - name: Upload SBIR awards input
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sbir-awards-input-fy${{ steps.params.outputs.fy }}
          path: data/raw/sbir/
          retention-days: 30
          if-no-files-found: warn

      # Upload USAspending intermediate data (API cache + per-company obligations)
      - name: Upload USAspending data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: usaspending-data-fy${{ steps.params.outputs.fy }}
          path: |
            data/scripts_output/usaspending_api_cache.json
            data/scripts_output/commercialization_obligations.csv
          retention-days: 30
          if-no-files-found: warn

      # Upload per-company evaluation detail (transition + commercialization CSVs)
      - name: Upload per-company evaluation detail
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: evaluation-detail-fy${{ steps.params.outputs.fy }}
          path: |
            data/scripts_output/transition_rate_detail.csv
            data/scripts_output/commercialization_rate_detail.csv
          retention-days: 30
          if-no-files-found: warn

      # Upload final results, report, and provenance
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-fy${{ steps.params.outputs.fy }}
          path: |
            data/scripts_output/run_manifest.json
            data/scripts_output/artifact_manifest.json
            data/scripts_output/benchmark_evaluation.json
            data/scripts_output/sensitivity_report_fy*.md
            data/scripts_output/at_risk.json
          retention-days: 30
          if-no-files-found: warn

  phase-transition:
    name: Phase II -> III Transition Latency
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event.schedule == '0 14 1 * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.analysis == 'phase-transition' || inputs.analysis == 'both'))
    container:
      image: ghcr.io/hollomancer/sbir-analytics:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        if: inputs.skip_upstream_download != true
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install AWS CLI
        if: inputs.skip_upstream_download != true
        run: pip install awscli && aws --version

      - name: Download upstream parquet files from S3
        if: inputs.skip_upstream_download != true
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data/transition data/processed

          CONTRACTS_KEY="processed/transition/contracts_ingestion.parquet"
          AWARDS_KEY="processed/sbir/enriched_sbir_awards.parquet"

          if aws s3api head-object --bucket "${S3_BUCKET}" --key "${CONTRACTS_KEY}" >/dev/null 2>&1; then
            aws s3 cp "s3://${S3_BUCKET}/${CONTRACTS_KEY}" data/transition/contracts_ingestion.parquet
            echo "Contracts parquet downloaded"
          else
            echo "No contracts parquet in S3 at s3://${S3_BUCKET}/${CONTRACTS_KEY} — asset will produce empty frame"
          fi

          if aws s3api head-object --bucket "${S3_BUCKET}" --key "${AWARDS_KEY}" >/dev/null 2>&1; then
            aws s3 cp "s3://${S3_BUCKET}/${AWARDS_KEY}" data/processed/enriched_sbir_awards.parquet
            echo "Enriched SBIR awards parquet downloaded"
          else
            echo "No SBIR awards parquet in S3 at s3://${S3_BUCKET}/${AWARDS_KEY} — reconciliation layer will be empty"
          fi

      - name: Materialize phase_transition assets
        env:
          SBIR_ETL__PHASE_TRANSITION__DATA_CUT_DATE: ${{ inputs.data_cut_date }}
        shell: bash
        run: |
          set -euo pipefail
          # Use $GITHUB_WORKSPACE (resolves to the container mount path, e.g. /__w/<repo>/<repo>)
          # rather than ${{ github.workspace }} (which returns the host path and doesn't exist
          # inside the container, so the sbir_analytics import fails).
          export PYTHONPATH="${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}/packages/sbir-analytics:${GITHUB_WORKSPACE}/packages/sbir-ml:${GITHUB_WORKSPACE}/packages/sbir-graph:${GITHUB_WORKSPACE}/packages/sbir-rag:/app"

          echo "## Phase II -> III Transition Latency" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Data cut:** ${SBIR_ETL__PHASE_TRANSITION__DATA_CUT_DATE:-today (UTC)}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          set +e
          dagster job execute \
            -m sbir_analytics.definitions \
            -j phase_transition_latency_job \
            2>&1 | tee phase_transition_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "### Dagster job failed" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -50 phase_transition_output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit "$EXIT_CODE"
          fi

      - name: Run DuckDB analysis
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/phase_transition

          # Skip gracefully if upstream produced no rows — script exits non-zero
          # when parquet files are missing, but with no upstream contracts
          # everything is empty and the report is uninteresting.
          if [ ! -s data/processed/phase_ii_awards.parquet ] || \
             [ ! -s data/processed/phase_iii_contracts.parquet ] || \
             [ ! -s data/processed/phase_ii_iii_pairs.parquet ] || \
             [ ! -s data/processed/phase_transition_survival.parquet ]; then
            echo "### Skipping analysis (upstream parquet missing or empty)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          python scripts/phase_transition_analysis.py \
            --phase-ii data/processed/phase_ii_awards.parquet \
            --phase-iii data/processed/phase_iii_contracts.parquet \
            --pairs data/processed/phase_ii_iii_pairs.parquet \
            --survival data/processed/phase_transition_survival.parquet \
            --out reports/phase_transition

      - name: Summarize report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          REPORT=reports/phase_transition/phase_transition_report.json
          if [ ! -f "$REPORT" ]; then
            echo "### No report generated" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "### Latency distribution" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          python -c "
          import json
          d = json.load(open('$REPORT'))
          print(json.dumps(d.get('latency_distribution', {}).get('percentiles_days', {}), indent=2))
          " >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Top agencies by Phase II volume" >> "$GITHUB_STEP_SUMMARY"
          echo '| Agency | Phase II total | Matched | Match rate | Median latency (days) |' >> "$GITHUB_STEP_SUMMARY"
          echo '|---|---:|---:|---:|---:|' >> "$GITHUB_STEP_SUMMARY"
          python -c "
          import json
          d = json.load(open('$REPORT'))
          for row in d.get('agency_breakdown', [])[:10]:
              print(f\"| {row['agency']} | {row['phase_ii_total']} | {row['matched']} | {row['match_rate']} | {row.get('median_latency_days', 'n/a')} |\")
          " >> "$GITHUB_STEP_SUMMARY"

      - name: Upload phase_transition artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: phase-transition-${{ github.run_id }}
          retention-days: 30
          path: |
            data/processed/phase_ii_awards.parquet
            data/processed/phase_ii_awards.checks.json
            data/processed/phase_iii_contracts.parquet
            data/processed/phase_iii_contracts.checks.json
            data/processed/phase_ii_iii_pairs.parquet
            data/processed/phase_ii_iii_pairs.checks.json
            data/processed/phase_transition_survival.parquet
            data/processed/phase_transition_survival.checks.json
            reports/phase_transition/phase_transition_report.json

      - name: Publish outputs to S3
        if: success() && inputs.skip_upstream_download != true
        shell: bash
        run: |
          set -euo pipefail
          RUN_PREFIX="processed/phase_transition/$(date -u +%Y-%m-%d)"
          for f in \
            data/processed/phase_ii_awards.parquet \
            data/processed/phase_ii_awards.checks.json \
            data/processed/phase_iii_contracts.parquet \
            data/processed/phase_iii_contracts.checks.json \
            data/processed/phase_ii_iii_pairs.parquet \
            data/processed/phase_ii_iii_pairs.checks.json \
            data/processed/phase_transition_survival.parquet \
            data/processed/phase_transition_survival.checks.json \
            reports/phase_transition/phase_transition_report.json; do
            if [ -f "$f" ]; then
              aws s3 cp "$f" "s3://${S3_BUCKET}/${RUN_PREFIX}/$(basename "$f")"
            fi
          done
          echo "Published outputs to s3://${S3_BUCKET}/${RUN_PREFIX}/" >> "$GITHUB_STEP_SUMMARY"
