name: Start Neo4j Container
description: Starts a Neo4j Docker container and waits for it to be ready

inputs:
  container-name:
    description: Name for the Neo4j container
    required: false
    default: "test-neo4j"
  neo4j-image:
    description: Neo4j Docker image
    required: false
    default: "neo4j:5"
  neo4j-user:
    description: Neo4j username
    required: false
    default: "neo4j"
  neo4j-password:
    description: Neo4j password
    required: false
    default: "password"
  timeout:
    description: Timeout in seconds to wait for Neo4j
    required: false
    default: "60"

outputs:
  neo4j-uri:
    description: Neo4j bolt URI
    value: "bolt://localhost:7687"

runs:
  using: composite
  steps:
    - name: Start Neo4j container
      shell: bash
      run: |
        docker run -d --name ${{ inputs.container-name }} \
          -e NEO4J_AUTH=${{ inputs.neo4j-user }}/${{ inputs.neo4j-password }} \
          -p 7687:7687 -p 7474:7474 \
          ${{ inputs.neo4j-image }}

    - name: Wait for Neo4j
      uses: ./.github/actions/wait-for-neo4j
      with:
        method: "tcp"
        port: "7687"
        timeout: ${{ inputs.timeout }}

    # Neo4j's bolt port opens BEFORE auth is fully initialized. Without this
    # probe, the first integration-test connection can land in the gap and
    # fail with Neo.ClientError.Security.Unauthorized — which then rate-limits
    # subsequent attempts (Neo.ClientError.Security.AuthenticationRateLimit).
    # Poll cypher-shell over docker exec until an authenticated RETURN succeeds.
    - name: Wait for Neo4j auth to initialize
      shell: bash
      run: |
        set -eu
        TIMEOUT=${{ inputs.timeout }}
        ELAPSED=0
        echo "Probing Neo4j auth as ${{ inputs.neo4j-user }}..."
        until docker exec ${{ inputs.container-name }} \
                cypher-shell -u "${{ inputs.neo4j-user }}" -p "${{ inputs.neo4j-password }}" \
                "RETURN 1" >/dev/null 2>&1; do
          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "❌ Neo4j auth did not initialize within ${TIMEOUT}s"
            docker logs ${{ inputs.container-name }} | tail -50 || true
            exit 1
          fi
          sleep 2
          ELAPSED=$((ELAPSED + 2))
        done
        echo "✅ Neo4j auth ready (waited ${ELAPSED}s)"

    - name: Set environment variables
      shell: bash
      run: |
        echo "NEO4J_URI=bolt://localhost:7687" >> $GITHUB_ENV
        echo "NEO4J_USER=${{ inputs.neo4j-user }}" >> $GITHUB_ENV
        echo "NEO4J_PASSWORD=${{ inputs.neo4j-password }}" >> $GITHUB_ENV
